<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Personal File Server</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0b0c10;
      --card-bg: rgba(30, 31, 38, 0.6);
      --accent-color: #6200ee;
      --accent-glow: rgba(98, 0, 238, 0.4);
      --text-color: #f5f5f7;
      --text-muted: #8e8e93;
      --error-color: #cf6679;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
    }

    body {
      background: radial-gradient(circle at center, #1f1b24 0%, #0b0c10 100%);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .login-container {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
      text-align: center;
      animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-container {
      margin-bottom: 24px;
    }

    .logo-icon {
      font-size: 48px;
      background: linear-gradient(135deg, #03dac6, #6200ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 12dp;
    }

    h1 {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    p {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 32px;
    }

    .input-group {
      margin-bottom: 24px;
      text-align: left;
    }

    label {
      display: block;
      color: var(--text-color);
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-color);
      font-size: 16px;
      outline: none;
      transition: all 0.3s ease;
    }

    input[type="password"]:focus {
      border-color: var(--accent-color);
      box-shadow: 0 0 10px var(--accent-glow);
      background: rgba(255, 255, 255, 0.08);
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, #6200ee, #3700b3);
      color: #ffffff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(98, 0, 238, 0.3);
      transition: all 0.3s ease;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(98, 0, 238, 0.5);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .error-msg {
      color: var(--error-color);
      font-size: 14px;
      margin-top: 16px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="logo-container">
      <div class="logo-icon">🖧</div>
      <h1>Cloud Server Portal</h1>
      <p>Log in to access your personal phone files</p>
    </div>

    <form id="loginForm">
      <div class="input-group">
        <label for="password">Admin Password</label>
        <input type="password" id="password" placeholder="Enter password" required autocomplete="current-password">
      </div>

      <button type="submit" class="btn-login">Connect Session</button>
      <div class="error-msg" id="errorMsg">Invalid credentials. Please try again.</div>
    </form>
  </div>

  <script>
    // Redirect if already logged in
    if (localStorage.getItem('server_jwt')) {
      window.location.href = '/';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });

        if (response.ok) {
          const data = await response.json();
          localStorage.setItem('server_jwt', data.token);
          window.location.href = '/';
        } else {
          errorMsg.style.display = 'block';
        }
      } catch (err) {
        console.error(err);
        errorMsg.textContent = 'Server connection failed.';
        errorMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
